<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>오프라인 — Anima</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #1E1B4B;
        color: #f8fafc;
      }
      main {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 12px;
      }
      p {
        margin: 0 0 24px;
        opacity: 0.8;
        line-height: 1.6;
      }
      button {
        background: #38bdf8;
        color: #1E1B4B;
        border: 0;
        padding: 12px 24px;
        border-radius: 999px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #7dd3fc;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>오프라인 상태입니다</h1>
      <p>
        인터넷 연결을 확인한 뒤 다시 시도해 주세요.<br />
        연결이 복구되면 자동으로 최신 뉴스를 받아올 수 있습니다.
      </p>
      <button onclick="location.reload()">다시 시도</button>
    </main>
  </body>
</html>
